<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivy</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase -->
    <script type="module" src="firebase.js"></script>

    <!-- App Scripts -->
    <script defer src="auth.js"></script>
    <script defer src="app.js"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="loginScreen" class="screen">

    <div class="logo">
        <h1>💜 Vivy</h1>
        <p>Meet New People Worldwide</p>
    </div>

    <div class="card">

        <input
        type="email"
        id="loginEmail"
        placeholder="Email">

        <input
        type="password"
        id="loginPassword"
        placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

        <button id="showRegisterBtn">
            Create Account
        </button>

    </div>

</div>

<!-- ================= REGISTER ================= -->

<div id="registerScreen" class="screen hidden">

    <div class="logo">
        <h1>Create Account</h1>
    </div>

    <div class="card">

        <input
        type="text"
        id="fullName"
        placeholder="Full Name">

        <input
        type="email"
        id="registerEmail"
        placeholder="Email">

        <input
        type="password"
        id="registerPassword"
        placeholder="Password">

        <select id="accountType">

            <option value="user">
                User
            </option>

            <option value="host">
                Host
            </option>

            <option value="agency">
                Agency
            </option>

        </select>

        <button id="registerBtn">
            Register
        </button>

        <button id="backLoginBtn">
            Back
        </button>

    </div>

</div>

<!-- ================= HOME ================= -->

<div id="homeScreen" class="hidden">

<header>

<div class="topBar">

<div class="title">

<h2>💜 Vivy</h2>

</div>

<div class="wallet">

🪙 <span id="coinBalance">0</span>

</div>

</div>

</header>

<main>

<div class="hostGrid">

<div class="hostCard">

<img
src="https://picsum.photos/300/400"
class="hostImage">

<div class="hostInfo">

<h3>Demo Host</h3>

<p>Online</p>

<button class="callButton">
Video Call
</button>

<button class="audioButton">
Audio Call
</button>

</div>

</div>

</div>

</main>

<nav class="bottomNav">

<button id="navHome">
🏠
</button>

<button id="navMessages">
💬
</button>

<button id="navCalls">
📞
</button>

<button id="navProfile">
👤
</button>

</nav>

</div>

</body>
  </html>
